services:
  mkvo:
    build:
      context: .
      dockerfile: Dockerfile
    image: mkvo:latest
    container_name: mkvo
    environment:
      # X11 example. On Linux hosts, run: xhost +local:docker
      DISPLAY: ${DISPLAY}
      XDG_RUNTIME_DIR: /tmp/runtime-root
    volumes:
      # X11 socket for GUI display
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Persistent MKVO settings/cache
      - mkvo_config:/root/.config/MKVOrchestrator

      # Mount media folders here. Adjust these paths for your host.
      - ./media:/media

      # Optional: expose host MKVToolNix install instead of container package.
      # - /usr/bin:/host-tools:ro
    devices:
      # Optional GPU/display devices for some Linux desktop setups.
      - /dev/dri:/dev/dri
    security_opt:
      # Often needed for GUI apps in containers; remove if your environment does not require it.
      - seccomp:unconfined

volumes:
  mkvo_config:
